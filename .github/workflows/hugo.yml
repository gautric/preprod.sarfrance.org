# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'content/**'
      - 'data/**'
      - 'static/**'
      - 'layouts/**'
      - 'hugo.yaml'
      - 'assets/**'
      - 'scripts/**'
      - 'themes/**'
      - 'i18n/**'


  # Rebuild daily at 6:00 UTC to keep upcoming events up to date
  schedule:
    - cron: '0 6 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.157.0
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.13'
  ACTION_CHECKOUT_VERSION: v4
  ACTION_SETUP_NODE_VERSION: v4
  ACTION_CONFIGURE_PAGES_VERSION: v5
  ACTION_SETUP_PYTHON_VERSION: v5
  ACTION_UPLOAD_PAGES_ARTIFACT_VERSION: v3
  ACTION_DEPLOY_PAGES_VERSION: v4

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@${{ env.ACTION_CHECKOUT_VERSION }}
        with:
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@${{ env.ACTION_SETUP_NODE_VERSION }}
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@${{ env.ACTION_CONFIGURE_PAGES_VERSION }}
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Setup Python
        uses: actions/setup-python@${{ env.ACTION_SETUP_PYTHON_VERSION }}
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Generate Excel inventory
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --quiet -r scripts/requirements.txt
          python scripts/export_books_excel.py
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@${{ env.ACTION_UPLOAD_PAGES_ARTIFACT_VERSION }}
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@${{ env.ACTION_DEPLOY_PAGES_VERSION }}
