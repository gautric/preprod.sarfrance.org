# =============================================================================
# Plan de migration des menus français — SAR France
# =============================================================================
# Ce fichier décrit toutes les modifications à appliquer, étape par étape.
# Langue : français uniquement. L'anglais sera traité après validation du hook.
# Branche : refonte-menus-fr
# =============================================================================

branche: refonte-menus-fr

# =============================================================================
# ÉTAPE 0 — Création de la branche
# =============================================================================
etape_0:
  description: "Créer la branche git refonte-menus-fr"
  commande: "git checkout -b refonte-menus-fr"

# =============================================================================
# ÉTAPE 1 — Renommage section Organisation → La Société
# =============================================================================
etape_1:
  description: "Déplacer le répertoire content/fr/organisation/ → content/fr/la-societe/"
  actions:
    # 1a. Créer le nouveau répertoire et déplacer tous les fichiers
    - type: deplacer_repertoire
      source: content/fr/organisation/
      destination: content/fr/la-societe/

    # 1b. Renommer les fichiers individuels dans le nouveau répertoire
    - type: renommer_fichier
      source: content/fr/la-societe/objet-et-vocation.md
      destination: content/fr/la-societe/mission-et-vocation.md

    - type: renommer_fichier
      source: content/fr/la-societe/histoire-de-sar-france.md
      destination: content/fr/la-societe/notre-histoire.md

    - type: renommer_fichier
      source: content/fr/la-societe/societes.md
      destination: content/fr/la-societe/societes-amies.md

    # 1c. Mettre à jour les titres (front matter) de chaque fichier
    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/la-societe/_index.md
          title_ancien: "Organisation"
          title_nouveau: "La Société"
          description_nouveau: "Conseil d'administration, délégations régionales, secrétariat et liaison avec la NSSAR"

        - fichier: content/fr/la-societe/mission-et-vocation.md
          title_ancien: "Objet et Vocation"
          title_nouveau: "Mission et vocation"

        - fichier: content/fr/la-societe/notre-histoire.md
          title_ancien: "Histoire de SAR France"
          title_nouveau: "Notre histoire"

        - fichier: content/fr/la-societe/statuts.md
          title_ancien: "Statuts & Règlement intérieur"
          title_nouveau: "Statuts et règlement"

        - fichier: content/fr/la-societe/societes-amies.md
          title_ancien: "Sociétés sœurs et liens utiles"
          title_nouveau: "Sociétés amies et liens"

    # 1d. Mettre à jour les liens internes DANS les fichiers déplacés
    - type: remplacer_liens
      fichier: content/fr/la-societe/notre-histoire.md
      remplacements:
        - ancien: "[La NSSAR](/organisation/nssar/)"
          nouveau: "[La NSSAR](/la-societe/nssar/)"
        - ancien: "[Objet et Vocation](/organisation/objet-et-vocation/)"
          nouveau: "[Mission et vocation](/la-societe/mission-et-vocation/)"
        - ancien: "[Sociétés sœurs](/organisation/societes/)"
          nouveau: "[Sociétés amies et liens](/la-societe/societes-amies/)"

    - type: remplacer_liens
      fichier: content/fr/la-societe/mission-et-vocation.md
      remplacements:
        - ancien: "[Histoire de SAR France](/organisation/histoire-de-sar-france/)"
          nouveau: "[Notre histoire](/la-societe/notre-histoire/)"

    - type: remplacer_liens
      fichier: content/fr/la-societe/nssar.md
      remplacements:
        - ancien: "[Histoire de SAR France](/organisation/histoire-de-sar-france/)"
          nouveau: "[Notre histoire](/la-societe/notre-histoire/)"

    # 1e. Mettre à jour les liens dans les AUTRES fichiers du site
    - type: remplacer_liens
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "[Histoire de SAR France](/organisation/histoire-de-sar-france/)"
          nouveau: "[Notre histoire](/la-societe/notre-histoire/)"

    - type: remplacer_liens
      fichier: content/fr/contact/nous-rejoindre.md
      remplacements:
        - ancien: "[Objet et Vocation](/organisation/objet-et-vocation/)"
          nouveau: "[Mission et vocation](/la-societe/mission-et-vocation/)"
        - ancien: "[DAR (Daughters of the American Revolution)](/organisation/societes/)"
          nouveau: "[DAR (Daughters of the American Revolution)](/la-societe/societes-amies/)"
        - ancien: "[CAR (Children of the American Revolution)](/organisation/societes/)"
          nouveau: "[CAR (Children of the American Revolution)](/la-societe/societes-amies/)"

    - type: remplacer_liens
      fichier: content/fr/activites/prix-trentinian.md
      remplacements:
        - ancien: "[Jacques de Trentinian](/organisation/histoire-de-sar-france/)"
          nouveau: "[Jacques de Trentinian](/la-societe/notre-histoire/)"

    - type: remplacer_liens
      fichier: content/fr/histoire/biographies/rochambeau.md
      remplacements:
        - ancien: "[Société des Cincinnati](/organisation/societes/)"
          nouveau: "[Société des Cincinnati](/la-societe/societes-amies/)"

    # 1f. Template footer
    - type: remplacer_liens
      fichier: themes/sarfrance/layouts/partials/footer.html
      remplacements:
        - ancien: "/organisation/societes/"
          nouveau: "/la-societe/societes-amies/"

  commit: "refonte(fr): section Organisation → La Société — répertoire, fichiers, titres et liens"

# =============================================================================
# ÉTAPE 2 — Stratégies et politique françaises → La France dans la guerre
# =============================================================================
etape_2:
  description: "Renommer la page stratégies"
  actions:
    - type: renommer_fichier
      source: content/fr/histoire/strategies-et-politique-francaises.md
      destination: content/fr/histoire/la-france-dans-la-guerre.md

    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/histoire/la-france-dans-la-guerre.md
          title_ancien: "Stratégies et politique françaises"
          title_nouveau: "La France dans la guerre"

    - type: remplacer_liens
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "[Stratégies et politique françaises](/histoire/strategies-et-politique-francaises/)"
          nouveau: "[La France dans la guerre](/histoire/la-france-dans-la-guerre/)"

    # Note : operations.md sera déjà renommé en campagnes-et-batailles.md à l'étape 3
    # mais on met à jour le lien dans le fichier actuel (sera renommé après)
    - type: remplacer_liens
      fichier: content/fr/histoire/operations.md
      remplacements:
        - ancien: "[Stratégies et politique françaises](/histoire/strategies-et-politique-francaises/)"
          nouveau: "[La France dans la guerre](/histoire/la-france-dans-la-guerre/)"

  commit: "refonte(fr): Stratégies et politique françaises → La France dans la guerre"

# =============================================================================
# ÉTAPE 3 — Opérations militaires → Campagnes et batailles
# =============================================================================
etape_3:
  description: "Renommer la page opérations"
  actions:
    - type: renommer_fichier
      source: content/fr/histoire/operations.md
      destination: content/fr/histoire/campagnes-et-batailles.md

    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/histoire/campagnes-et-batailles.md
          title_ancien: "Opérations militaires en Amérique du Nord"
          title_nouveau: "Campagnes et batailles"

    - type: remplacer_liens
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "[Opérations militaires en Amérique du Nord](/histoire/operations/)"
          nouveau: "[Campagnes et batailles](/histoire/campagnes-et-batailles/)"

    - type: remplacer_liens
      fichier: content/fr/histoire/biographies/rochambeau.md
      remplacements:
        - ancien: "[Opérations militaires](/histoire/operations/)"
          nouveau: "[Campagnes et batailles](/histoire/campagnes-et-batailles/)"

    - type: remplacer_liens
      fichier: content/fr/histoire/biographies/de-grasse.md
      remplacements:
        - ancien: "[Opérations militaires](/histoire/operations/)"
          nouveau: "[Campagnes et batailles](/histoire/campagnes-et-batailles/)"

    # Lien dans pertes-francaises.md (sera renommé à l'étape 5)
    - type: remplacer_liens
      fichier: content/fr/histoire/pertes-francaises.md
      remplacements:
        - ancien: "[Opérations militaires en Amérique du Nord](/histoire/operations/)"
          nouveau: "[Campagnes et batailles](/histoire/campagnes-et-batailles/)"

  commit: "refonte(fr): Opérations militaires → Campagnes et batailles"

# =============================================================================
# ÉTAPE 4 — Chefs militaires et volontaires → Chefs et volontaires
# =============================================================================
etape_4:
  description: "Renommer la page chefs militaires"
  actions:
    - type: renommer_fichier
      source: content/fr/histoire/chefs-militaires.md
      destination: content/fr/histoire/chefs-et-volontaires.md

    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/histoire/chefs-et-volontaires.md
          title_ancien: "Chefs militaires et volontaires"
          title_nouveau: "Chefs et volontaires"

    - type: remplacer_liens
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "[Chefs militaires et volontaires](/histoire/chefs-militaires/)"
          nouveau: "[Chefs et volontaires](/histoire/chefs-et-volontaires/)"

    # Lien dans campagnes-et-batailles.md (déjà renommé à l'étape 3)
    - type: remplacer_liens
      fichier: content/fr/histoire/campagnes-et-batailles.md
      remplacements:
        - ancien: "[Chefs militaires et volontaires](/histoire/chefs-militaires/)"
          nouveau: "[Chefs et volontaires](/histoire/chefs-et-volontaires/)"

  commit: "refonte(fr): Chefs militaires et volontaires → Chefs et volontaires"

# =============================================================================
# ÉTAPE 5 — Pertes françaises → Le coût humain
# =============================================================================
etape_5:
  description: "Renommer la page pertes françaises"
  actions:
    - type: renommer_fichier
      source: content/fr/histoire/pertes-francaises.md
      destination: content/fr/histoire/cout-humain.md

    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/histoire/cout-humain.md
          title_ancien: "Le coût humain de la guerre pour la France"
          title_nouveau: "Le coût humain"

    - type: remplacer_liens
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "[Le coût humain de la guerre](/histoire/pertes-francaises/)"
          nouveau: "[Le coût humain](/histoire/cout-humain/)"

    # Lien dans campagnes-et-batailles.md (déjà renommé)
    - type: remplacer_liens
      fichier: content/fr/histoire/campagnes-et-batailles.md
      remplacements:
        - ancien: "[tableau détaillé des pertes françaises](/histoire/pertes-francaises/)"
          nouveau: "[tableau détaillé des pertes françaises](/histoire/cout-humain/)"

  commit: "refonte(fr): Pertes françaises → Le coût humain"

# =============================================================================
# ÉTAPE 6 — Hauts lieux en France → Lieux de mémoire
# =============================================================================
etape_6:
  description: "Renommer la page hauts lieux"
  actions:
    - type: renommer_fichier
      source: content/fr/histoire/hauts-lieux.md
      destination: content/fr/histoire/lieux-de-memoire.md

    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/histoire/lieux-de-memoire.md
          title_ancien: "Hauts lieux en France"
          title_nouveau: "Lieux de mémoire"

    - type: remplacer_liens
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "[Hauts lieux en France](/histoire/hauts-lieux/)"
          nouveau: "[Lieux de mémoire](/histoire/lieux-de-memoire/)"

  commit: "refonte(fr): Hauts lieux en France → Lieux de mémoire"

# =============================================================================
# ÉTAPE 7 — Dictionnaire biographique → Dictionnaire des ancêtres
# =============================================================================
etape_7:
  description: "Renommer la page dictionnaire"
  actions:
    - type: renommer_fichier
      source: content/fr/activites/dictionnaire.md
      destination: content/fr/activites/dictionnaire-des-ancetres.md

    - type: modifier_front_matter
      fichiers:
        - fichier: content/fr/activites/dictionnaire-des-ancetres.md
          title_ancien: "Dictionnaire biographique"
          title_nouveau: "Dictionnaire des ancêtres"

    # Mettre à jour le contenu interne du fichier
    - type: remplacer_texte
      fichier: content/fr/activites/dictionnaire-des-ancetres.md
      remplacements:
        - ancien: "## Dictionnaire biographique des ancêtres SAR France"
          nouveau: "## Dictionnaire des ancêtres SAR France"
        - ancien: "Ce dictionnaire biographique s'enrichit"
          nouveau: "Ce dictionnaire s'enrichit"

    # Liens dans _index.md des activités
    - type: remplacer_liens
      fichier: content/fr/activites/_index.md
      remplacements:
        - ancien: "[dictionnaire biographique](/activites/dictionnaire/)"
          nouveau: "[dictionnaire des ancêtres](/activites/dictionnaire-des-ancetres/)"
        - ancien: "[Dictionnaire biographique](/activites/dictionnaire/)"
          nouveau: "[Dictionnaire des ancêtres](/activites/dictionnaire-des-ancetres/)"

    # Lien dans histoire/_index.md (texte de description)
    - type: remplacer_texte
      fichier: content/fr/histoire/_index.md
      remplacements:
        - ancien: "Dictionnaire biographique des ancêtres SAR France homologués"
          nouveau: "Dictionnaire des ancêtres SAR France homologués"

  commit: "refonte(fr): Dictionnaire biographique → Dictionnaire des ancêtres"

# =============================================================================
# ÉTAPE 8 — Nous contacter → Nous écrire (menu uniquement)
# =============================================================================
etape_8:
  description: "Changer le libellé du sous-menu Contact"
  actions:
    # Aucun fichier à renommer — uniquement le menu dans hugo.yaml
    - type: noter
      message: "Seul le name du menu 'formulaire' change dans hugo.yaml"

  commit: "refonte(fr): menu Nous contacter → Nous écrire"

# =============================================================================
# ÉTAPE 9 — Mise à jour hugo.yaml (tous les menus français)
# =============================================================================
etape_9:
  description: "Appliquer tous les changements de menus français dans hugo.yaml"
  actions:
    - type: modifier_menu_hugo
      langue: fr
      modifications:
        # Menu principal
        - identifier: organisation
          name: "La Société"
          url: "/la-societe/"

        # Sous-menus La Société
        - identifier: organisation-index
          name: "La Société"
          url: "/la-societe/"

        - identifier: objet-et-vocation
          name: "Mission et vocation"
          url: "/la-societe/mission-et-vocation/"

        - identifier: histoire-sar-france
          name: "Notre histoire"
          url: "/la-societe/notre-histoire/"

        - identifier: nssar
          name: "La NSSAR"
          url: "/la-societe/nssar/"

        - identifier: statuts
          name: "Statuts et règlement"
          url: "/la-societe/statuts/"

        - identifier: societes
          name: "Sociétés amies et liens"
          url: "/la-societe/societes-amies/"

        # Sous-menus Histoire
        - identifier: strategies
          name: "La France dans la guerre"
          url: "/histoire/la-france-dans-la-guerre/"

        - identifier: operations
          name: "Campagnes et batailles"
          url: "/histoire/campagnes-et-batailles/"

        - identifier: chefs
          name: "Chefs et volontaires"
          url: "/histoire/chefs-et-volontaires/"

        - identifier: pertes-francaises
          name: "Le coût humain"
          url: "/histoire/cout-humain/"

        - identifier: hauts-lieux
          name: "Lieux de mémoire"
          url: "/histoire/lieux-de-memoire/"

        # Sous-menus Activités
        - identifier: dictionnaire
          name: "Dictionnaire des ancêtres"
          url: "/activites/dictionnaire-des-ancetres/"

        # Sous-menus Contact
        - identifier: formulaire
          name: "Nous écrire"
          url: "/contact"

  commit: "refonte(fr): mise à jour complète des menus français dans hugo.yaml"

# =============================================================================
# ÉTAPE 10 — Mise à jour i18n/fr.yaml
# =============================================================================
etape_10:
  description: "Mettre à jour les traductions françaises"
  actions:
    - type: modifier_i18n
      fichier: i18n/fr.yaml
      modifications:
        - id: footer_organisation
          ancien: "Organisation"
          nouveau: "La Société"

  commit: "refonte(fr): i18n footer Organisation → La Société"

# =============================================================================
# ÉTAPE 11 — Vérification du build Hugo
# =============================================================================
etape_11:
  description: "Lancer un build Hugo pour vérifier qu'il n'y a pas d'erreur"
  commande: "hugo --minify --printPathWarnings 2>&1 | head -50"

# =============================================================================
# ÉTAPE 12 — Attente du hook pour la migration anglaise
# =============================================================================
etape_12:
  description: "Attendre la validation du hook avant de migrer content/en/"
  actions:
    - type: noter
      message: >
        La migration anglaise reprendra le même schéma :
        - Renommer content/en/organisation/ → content/en/la-societe/
        - Mêmes renommages de fichiers dans content/en/histoire/ et content/en/activites/
        - Mettre à jour les menus anglais dans hugo.yaml (URLs + names traduits)
        - Mettre à jour i18n/en.yaml
        - Mettre à jour les liens internes dans les pages anglaises
