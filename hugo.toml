baseURL = 'https://preprod.sarfrance.org/'
languageCode = 'fr-FR'
title = 'SAR France - Les Fils de la Révolution Américaine'
theme = 'sarfrance-theme'

[params]
  description = "SAR France - Société en France des Fils de la Révolution Américaine"
  author = "SAR France"
