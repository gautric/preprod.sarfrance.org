    personnages:
    - Daniel Carroll
    - John Carroll
    - Charles Carroll
    description: Former Jesuit College where Daniel Carroll, John Carroll and Charles Carroll from Maryland studied. Daniel and Charles signed the Constitution and the Declaration of Independence; John founded Georgetown University.
    wikipedia: https://en.wikipedia.org/wiki/Charles_Carroll_of_Carrollton
  - titre: Museum of Franco-American Cooperation at Blérancourt
