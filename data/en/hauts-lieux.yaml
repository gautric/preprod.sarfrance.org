- title: Paris, Birthplace of the U.S.A.
  author: Daniel Jouve
  date: '1996'
  publisher: éditions Gründ
  description: Describes 23 Parisian sites that played a significant role in the American Revolution.
regions:
- nom: Paris – Right Bank
  lieux:
  - titre: Hôtel de Langeac
    adresse: corner of Champs-Élysées / rue de Berri, 8th
    lat: 48.8717
    lon: 2.3031
    tags:
    - résidence
    personnages:
    - Thomas Jefferson
    description: Residence of Thomas Jefferson from 1785 to 1789, while serving as Minister Plenipotentiary to the Kingdom of France. The mansion, built in 1768 by architect Chalgrin, served as both private residence and official legation. Jefferson lived there with his daughters, his secretary William Short, and his servants. Demolished in 1842.
    wikipedia: https://en.wikipedia.org/wiki/Thomas_Jefferson
  - titre: Residence of the Marquis de La Fayette
    adresse: 8 rue d'Anjou, 8th
    lat: 48.8719
    lon: 2.3212
    tags:
    - résidence
    personnages:
    - La Fayette
    description: La Fayette's last Parisian residence, where he lived from 1827 until his death on May 20, 1834. A commemorative plaque marks the site.
    wikipedia: https://en.wikipedia.org/wiki/Marquis_de_Lafayette
  - titre: Equestrian Statue of La Fayette
    adresse: Cours La Reine, 8th
    lat: 48.8600
    lon: 2.3100
    tags:
    - statue
    personnages:
    - La Fayette
    description: By American sculptor Paul Wayland Bartlett, funded by a subscription among American schoolchildren initiated by Robert J. Thompson of Chicago, to thank France for the Statue of Liberty. Unveiled on July 4, 1900 in the Louvre's Cour Napoléon (first in plaster, replaced in bronze in 1908), then moved to Cours La Reine in 1985.
    wikipedia: https://en.wikipedia.org/wiki/Paul_Wayland_Bartlett
  - titre: Picpus Cemetery
    adresse: 35 rue de Picpus, 12th
    lat: 48.8440
    lon: 2.4001
    tags:
    - cimetière
    - lieu-de-mémoire
    personnages:
    - La Fayette
    - Adrienne de Noailles
    description: Where La Fayette and his wife Adrienne de Noailles are buried. La Fayette was interred in soil he had brought back from America in 1824. On July 4, 1917, Colonel Stanton spoke the famous words "Lafayette, we are here!" An American flag flies permanently over his grave — the only one displayed in occupied Paris during WWII.
    wikipedia: https://en.wikipedia.org/wiki/Picpus_Cemetery
  - titre: Statue of Thomas Paine
    adresse: Parc Montsouris, 14th
    lat: 48.8222
    lon: 2.3381
    tags:
    - statue
    personnages:
    - Thomas Paine
    description: Gilded bronze statue of Thomas Paine (1737–1809), a major figure of the American Revolution and member of the French Convention. Created by Gutzon Borglum (sculptor of Mount Rushmore), commissioned in 1937, hidden during WWII and unveiled in 1948.
    wikipedia: https://en.wikipedia.org/wiki/Thomas_Paine
  - titre: Equestrian Statue of Washington
    adresse: Place d'Iéna, 16th
    lat: 48.8600
    lon: 2.2900
    tags:
    - statue
    personnages:
    - George Washington
    description: 'By American sculptors Daniel Chester French and Edward Clark Potter, offered by a committee of American women and unveiled on July 3, 1900. Inscription: "Offered by the women of the United States of America in memory of the fraternal aid given by France to their fathers during the struggle for Independence."'
    wikipedia: https://en.wikipedia.org/wiki/Place_d%27I%C3%A9na
  - titre: La Fayette and Washington Monument
    adresse: Place des États-Unis, 16th
    lat: 48.8680
    lon: 2.2941
    tags:
    - statue
    personnages:
    - La Fayette
    - George Washington
    description: Bronze group by Frédéric Auguste Bartholdi (creator of the Statue of Liberty), commissioned by publisher Joseph Pulitzer in 1887. Washington and La Fayette shake hands on either side of the French and American flags. Unveiled December 2, 1895. A replica stands in Lafayette Square, Manhattan.
    wikipedia: https://en.wikipedia.org/wiki/Place_des_%C3%89tats-Unis#Statue_of_Washington_and_Lafayette
  - titre: Statue of Rochambeau
    adresse: Place Rochambeau, 16th
    lat: 48.8663
    lon: 2.2967
    tags:
    - statue
    personnages:
    - Rochambeau
    description: Bronze statue by sculptor Fernand Hamar, erected in 1933 through a Franco-American subscription, honoring the commander of the French expeditionary corps during the War of Independence.
    wikipedia: https://fr.wikipedia.org/wiki/Fernand_Hamar
  - titre: Monument to Admiral de Grasse
    adresse: Trocadéro Gardens, 16th
    lat: 48.8617
    lon: 2.287
    tags:
    - statue
    personnages:
    - Amiral de Grasse
    description: Bronze monument by sculptor Paul Landowski, donated to the City of Paris by American A. Kingsley Macomber in 1931, in memory of the hero of the Battle of the Chesapeake (1781).
    wikipedia: https://en.wikipedia.org/wiki/Paul_Landowski
  - titre: Monument to Benjamin Franklin
    adresse: Square de Yorktown, 16th
    lat: 48.8617
    lon: 2.2864
    tags:
    - statue
    personnages:
    - Benjamin Franklin
    description: Bronze statue by John J. Boyle, donated by Franco-American John H. Harjes in 1906. The square is named after the decisive Battle of Yorktown (1781). The bas-reliefs depict Franklin's reception at Versailles (1778) and the signing of the Treaty of Paris (1783).
    wikipedia: https://fr.wikipedia.org/wiki/Square_de_Yorktown
- nom: Paris – Left Bank
  lieux:
  - titre: Hôtel de Valentinois
    adresse: corner of rue Raynouard / rue Singer, 16th
    lat: 48.8564
    lon: 2.2783
    tags:
    - résidence
    personnages:
    - Benjamin Franklin
    description: Residence of Benjamin Franklin from 1777 to 1785, provided by Jacques-Donatien Le Ray de Chaumont. Franklin established the official American Legation and a printing press there. He received Turgot, Buffon, d'Alembert, Condorcet, Beaumarchais, and the young La Fayette. From Passy, he negotiated the Treaties of Amity, Commerce and Alliance signed on February 6, 1778. On November 21, 1783, he witnessed the first manned flight in history from the nearby Château de la Muette.
    wikipedia: https://en.wikipedia.org/wiki/Benjamin_Franklin
  - titre: Hôtel Antier
    adresse: 43-47 rue d'Auteuil, 16th
    lat: 48.8478
    lon: 2.2587
    tags:
    - résidence
    personnages:
    - John Adams
    - John Quincy Adams
    description: Residence of John Adams (future 2nd President) and his son John Quincy Adams (future 6th President) from August 1784 to May 1785. Adams had negotiated alongside Franklin and Jay the Treaty of Paris of 1783 that ended the War of Independence.
    wikipedia: https://en.wikipedia.org/wiki/John_Adams
- nom: Auvergne-Rhône-Alpes
  lieux:
  - titre: Château de Chavaniac
    adresse: Chavaniac-Lafayette, Haute-Loire
    lat: 45.1187
    lon: 3.5934
    tags:
    - château
    - lieu-de-mémoire
    personnages:
    - La Fayette
    url: https://www.chateau-lafayette.com/
    description: Birthplace of La Fayette on September 6, 1757. Purchased in 1916 by the French Heroes Lafayette Memorial Fund, it is now a listed historic monument open to the public.
  - titre: Paccard Foundry
    adresse: Sevrier, Haute-Savoie
    lat: 45.8449
    lon: 6.1526
    tags:
    - arsenal
    personnages: []
    url: https://www.paccard.com/
    description: Bell foundry established in 1796. In 1950, the U.S. government commissioned 54 replicas of the Liberty Bell for each state and territory. One of the remaining copies was donated to Annecy in 1951.
    wikipedia: https://en.wikipedia.org/wiki/Liberty_Bell
  - titre: Saint-Étienne Arms Manufactory
    adresse: Saint-Étienne, Loire
    lat: 45.434
    lon: 4.39
    tags:
    - arsenal
    personnages:
    - Beaumarchais
    description: Royal manufactory established in 1764, which supplied arms to the American insurgents during the War of Independence, in collaboration with Beaumarchais and private shipowners.
    wikipedia: https://en.wikipedia.org/wiki/Manufacture_d%27armes_de_Saint-%C3%89tienne
  - titre: Royal Forges of Guérigny
    adresse: Guérigny, Nièvre
    lat: 47.087
    lon: 3.193
    tags:
    - arsenal
    personnages:
    - Pierre Babaud de La Chaussade
    description: Pierre Babaud de La Chaussade's metallurgical enterprise, specialized in anchor parts for the Navy. The forges helped arm the French ships engaged in the Battle of the Chesapeake (1781).
    wikipedia: https://fr.wikipedia.org/wiki/Forges_de_la_Chauss%C3%A9e
  - titre: Bourbonnais Memorial Stele
    adresse: Yzeure, Allier
    lat: 46.342
    lon: 3.354
    tags:
    - stèle
    personnages: []
    description: Unveiled on October 13, 2025, honoring combatants from the Bourbonnais region who fought in the War of Independence, including at least 77 volunteers from the Allier.
- nom: Brittany
  lieux:
