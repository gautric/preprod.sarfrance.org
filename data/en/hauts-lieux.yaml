    lat: 49.119
    lon: 6.176
    tags:
    - lieu-de-mémoire
    personnages:
    - La Fayette
    description: Site of the former Hôtel Haute Pierre where the "Metz supper" took place on August 8, 1775, during which La Fayette decided to sail for America, encouraged by the Duke of Gloucester. A statue of La Fayette stands in the Jardin Boufflers.
