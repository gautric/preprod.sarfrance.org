    description: France's foremost naval arsenal and departure point for expeditions to America. La Fayette landed here in February 1779; Rochambeau departed on May 2, 1780 with 5,500 men; Admiral de Grasse set sail on March 22, 1781. A monument to Rochambeau and de Grasse stands on Cours Dajot.
  - titre: Lorient
    adresse: Lorient, Morbihan
    lat: 47.748
    lon: -3.37
    tags:
    - port
    personnages:
    - John Paul Jones
    description: From where John Paul Jones departed on May 1, 1779 aboard the frigate USS Bonhomme Richard, provided by Louis XVI.
    wikipedia: https://en.wikipedia.org/wiki/John_Paul_Jones
  - titre: Château de la Rouërie
    adresse: Saint-Ouen-la-Rouërie, Ille-et-Vilaine
    lat: 48.4636
    lon: -1.4397
    tags:
    - château
    personnages:
    - Armand Tuffin de la Rouërie
    description: Estate of Armand Tuffin de la Rouërie, known as "Colonel Armand," who fought in the Continental Army and participated in the Battle of Yorktown. A friend of Washington, he was promoted to Brigadier General.
    wikipedia: https://fr.wikipedia.org/wiki/Ch%C3%A2teau_de_la_Rou%C3%ABrie
