    personnages:
    - Thomas Jefferson
    description: Now Collège Pierre-de-Fermat. Where Thomas Jefferson stayed on May 21–22, 1787 during his Canal du Midi journey.
    wikipedia: https://en.wikipedia.org/wiki/Lyc%C3%A9e_Pierre-de-Fermat
