    personnages:
    - Benjamin Franklin
    description: Where Benjamin Franklin landed on December 4, 1776, after crossing from Philadelphia. The quay now bears the name Quai Franklin.
    wikipedia: https://en.wikipedia.org/wiki/Saint-Goustan
  - titre: Brest
