        description: "Fonderie de cloches créée en 1796. En 1950, le gouvernement américain lui commanda 54 répliques de la Liberty Bell destinées aux États et territoires des États-Unis. L'un des exemplaires restants fut offert à Annecy en 1951."
        descriptionEn: "Bell foundry established in 1796. In 1950, the U.S. government commissioned 54 replicas of the Liberty Bell for each state and territory. One of the remaining copies was donated to Annecy in 1951."
