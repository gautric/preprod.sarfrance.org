regions:
  - nom: "Paris – Rive droite"
    nomEn: "Paris – Right Bank"
    lieux:
      - titre: "Hôtel de Langeac"
        titreEn: "Hôtel de Langeac"
        adresse: "angle Champs-Élysées / rue de Berri, 8e"
        adresseEn: "corner of Champs-Élysées / rue de Berri, 8th"
        lat: 48.87189
        lon: 2.30640
        tags: [résidence]
        personnages: [Thomas Jefferson]
        description: "Résidence de Thomas Jefferson de 1785 à 1789, alors ministre plénipotentiaire auprès du Royaume de France. L'hôtel, édifié en 1768 par l'architecte Chalgrin, servait à la fois de résidence privée et de légation officielle. Jefferson y vivait avec ses filles, son secrétaire William Short et ses serviteurs. Démoli en 1842."
        descriptionEn: "Residence of Thomas Jefferson from 1785 to 1789, while serving as Minister Plenipotentiary to the Kingdom of France. The mansion, built in 1768 by architect Chalgrin, served as both private residence and official legation. Jefferson lived there with his daughters, his secretary William Short, and his servants. Demolished in 1842."
        wikipedia: "https://fr.wikipedia.org/wiki/Thomas_Jefferson"
        wikipediaEn: "https://en.wikipedia.org/wiki/Thomas_Jefferson"

      - titre: "Résidence du marquis de La Fayette"
        titreEn: "Residence of the Marquis de La Fayette"
        adresse: "8 rue d'Anjou, 8e"
        adresseEn: "8 rue d'Anjou, 8th"
        lat: 48.87190
        lon: 2.32120
        tags: [résidence]
        personnages: [La Fayette]
        description: "Dernière résidence parisienne de La Fayette, où il vécut de 1827 à sa mort le 20 mai 1834. Une plaque commémorative rappelle sa mémoire."
        descriptionEn: "La Fayette's last Parisian residence, where he lived from 1827 until his death on May 20, 1834. A commemorative plaque marks the site."
        wikipedia: "https://fr.wikipedia.org/wiki/La_Fayette_(g%C3%A9n%C3%A9ral)"
        wikipediaEn: "https://en.wikipedia.org/wiki/Marquis_de_Lafayette"

      - titre: "Statue équestre de La Fayette"
        titreEn: "Equestrian Statue of La Fayette"
        adresse: "Cours La Reine, 8e"
        adresseEn: "Cours La Reine, 8th"
        lat: 48.86560
        lon: 2.31340
        tags: [statue]
        personnages: [La Fayette]
        description: "Œuvre du sculpteur américain Paul Wayland Bartlett, financée par une souscription des écoliers américains à l'initiative de Robert J. Thompson de Chicago, pour remercier la France du don de la Statue de la Liberté. Inaugurée le 4 juillet 1900 dans la cour Napoléon du Louvre (d'abord en plâtre, remplacée en bronze en 1908), puis déplacée Cours La Reine en 1985."
        descriptionEn: "By American sculptor Paul Wayland Bartlett, funded by a subscription among American schoolchildren initiated by Robert J. Thompson of Chicago, to thank France for the Statue of Liberty. Unveiled on July 4, 1900 in the Louvre's Cour Napoléon (first in plaster, replaced in bronze in 1908), then moved to Cours La Reine in 1985."
        wikipedia: "https://fr.wikipedia.org/wiki/Paul_Wayland_Bartlett"
        wikipediaEn: "https://en.wikipedia.org/wiki/Paul_Wayland_Bartlett"

      - titre: "Cimetière de Picpus"
        titreEn: "Picpus Cemetery"
        adresse: "35 rue de Picpus, 12e"
        adresseEn: "35 rue de Picpus, 12th"
        lat: 48.84340
        lon: 2.39710
        tags: [cimetière, lieu-de-mémoire]
        personnages: [La Fayette, Adrienne de Noailles]
        description: "Où reposent La Fayette et son épouse Adrienne de Noailles. La Fayette fut inhumé dans une terre ramenée d'Amérique en 1824. Le 4 juillet 1917, le colonel Stanton y prononça la célèbre formule « Lafayette, we are here ! ». Un drapeau américain flotte en permanence sur sa tombe — le seul déployé dans Paris durant l'Occupation."
        descriptionEn: "Where La Fayette and his wife Adrienne de Noailles are buried. La Fayette was interred in soil he had brought back from America in 1824. On July 4, 1917, Colonel Stanton spoke the famous words \"Lafayette, we are here!\" An American flag flies permanently over his grave — the only one displayed in occupied Paris during WWII."
        wikipedia: "https://fr.wikipedia.org/wiki/Cimeti%C3%A8re_de_Picpus"
        wikipediaEn: "https://en.wikipedia.org/wiki/Picpus_Cemetery"

      - titre: "Statue de Thomas Paine"
        titreEn: "Statue of Thomas Paine"
        adresse: "Parc Montsouris, 14e"
        adresseEn: "Parc Montsouris, 14th"
        lat: 48.82220
        lon: 2.33810
        tags: [statue]
        personnages: [Thomas Paine]
        description: "Statue en bronze doré représentant Thomas Paine (1737-1809), figure majeure de la Révolution américaine et député à la Convention. Réalisée par Gutzon Borglum (sculpteur du Mont Rushmore), commandée en 1937, cachée pendant la Seconde Guerre mondiale et inaugurée en 1948."
        descriptionEn: "Gilded bronze statue of Thomas Paine (1737–1809), a major figure of the American Revolution and member of the French Convention. Created by Gutzon Borglum (sculptor of Mount Rushmore), commissioned in 1937, hidden during WWII and unveiled in 1948."
        wikipedia: "https://fr.wikipedia.org/wiki/Thomas_Paine"
        wikipediaEn: "https://en.wikipedia.org/wiki/Thomas_Paine"

      - titre: "Statue équestre de Washington"
        titreEn: "Equestrian Statue of Washington"
        adresse: "Place d'Iéna, 16e"
        adresseEn: "Place d'Iéna, 16th"
        lat: 48.86440
        lon: 2.29370
        tags: [statue]
        personnages: [George Washington]
        description: "Œuvre des sculpteurs américains Daniel Chester French et Edward Clark Potter, offerte par un comité de femmes américaines et inaugurée le 3 juillet 1900. Dédicace : « Offert par les femmes des États-Unis d'Amérique en mémoire de l'aide fraternelle donnée par la France à leurs pères pendant la lutte pour l'Indépendance. »"
        descriptionEn: "By American sculptors Daniel Chester French and Edward Clark Potter, offered by a committee of American women and unveiled on July 3, 1900. Inscription: \"Offered by the women of the United States of America in memory of the fraternal aid given by France to their fathers during the struggle for Independence.\""
        wikipedia: "https://fr.wikipedia.org/wiki/Place_d%27I%C3%A9na"
        wikipediaEn: "https://en.wikipedia.org/wiki/Place_d%27I%C3%A9na"

      - titre: "Monument à La Fayette et Washington"
        titreEn: "La Fayette and Washington Monument"
        adresse: "Place des États-Unis, 16e"
        adresseEn: "Place des États-Unis, 16th"
        lat: 48.86640
        lon: 2.29060
        tags: [statue]
        personnages: [La Fayette, George Washington]
        description: "Groupe en bronze de Frédéric Auguste Bartholdi (l'auteur de la Statue de la Liberté), commandé par l'éditeur Joseph Pulitzer en 1887. Washington et La Fayette se serrent la main de part et d'autre des drapeaux français et américain. Inauguré le 2 décembre 1895. Une réplique se trouve à Lafayette Square, Manhattan."
        descriptionEn: "Bronze group by Frédéric Auguste Bartholdi (creator of the Statue of Liberty), commissioned by publisher Joseph Pulitzer in 1887. Washington and La Fayette shake hands on either side of the French and American flags. Unveiled December 2, 1895. A replica stands in Lafayette Square, Manhattan."
        wikipedia: "https://fr.wikipedia.org/wiki/Place_des_%C3%89tats-Unis#Le_Monument_%C3%A0_La_Fayette_et_Washington"
        wikipediaEn: "https://en.wikipedia.org/wiki/Place_des_%C3%89tats-Unis#Statue_of_Washington_and_Lafayette"

      - titre: "Statue de Rochambeau"
        titreEn: "Statue of Rochambeau"
        adresse: "Place Rochambeau, 16e"
        adresseEn: "Place Rochambeau, 16th"
        lat: 48.86310
        lon: 2.28530
        tags: [statue]
        personnages: [Rochambeau]
        description: "Statue en bronze du sculpteur Fernand Hamar, érigée en 1933 grâce à une souscription franco-américaine, en l'honneur du commandant du corps expéditionnaire français lors de la Guerre d'Indépendance."
        descriptionEn: "Bronze statue by sculptor Fernand Hamar, erected in 1933 through a Franco-American subscription, honoring the commander of the French expeditionary corps during the War of Independence."
        wikipedia: "https://fr.wikipedia.org/wiki/Fernand_Hamar"

      - titre: "Monument à l'amiral de Grasse"
        titreEn: "Monument to Admiral de Grasse"
        adresse: "Jardins du Trocadéro, 16e"
        adresseEn: "Trocadéro Gardens, 16th"
        lat: 48.86170
        lon: 2.28700
        tags: [statue]
        personnages: [Amiral de Grasse]
        description: "Monument en bronze du sculpteur Paul Landowski, offert à la Ville de Paris par l'Américain A. Kingsley Macomber en 1931, à la mémoire du héros de la Bataille navale de la Baie de Chesapeake (1781)."
        descriptionEn: "Bronze monument by sculptor Paul Landowski, donated to the City of Paris by American A. Kingsley Macomber in 1931, in memory of the hero of the Battle of the Chesapeake (1781)."
        wikipedia: "https://fr.wikipedia.org/wiki/Paul_Landowski"
        wikipediaEn: "https://en.wikipedia.org/wiki/Paul_Landowski"

      - titre: "Monument à Benjamin Franklin"
        titreEn: "Monument to Benjamin Franklin"
        adresse: "Square de Yorktown, 16e"
        adresseEn: "Square de Yorktown, 16th"
        lat: 48.86100
        lon: 2.28200
        tags: [statue]
        personnages: [Benjamin Franklin]
        description: "Statue en bronze de John J. Boyle, offerte par le Franco-Américain John H. Harjes en 1906. Le square porte le nom de la bataille décisive de Yorktown (1781). Les bas-reliefs représentent la réception de Franklin à Versailles (1778) et la signature du Traité de Paris (1783)."
        descriptionEn: "Bronze statue by John J. Boyle, donated by Franco-American John H. Harjes in 1906. The square is named after the decisive Battle of Yorktown (1781). The bas-reliefs depict Franklin's reception at Versailles (1778) and the signing of the Treaty of Paris (1783)."
        wikipedia: "https://fr.wikipedia.org/wiki/Square_de_Yorktown"

  - nom: "Paris – Rive gauche"
    nomEn: "Paris – Left Bank"
    lieux:
      - titre: "Hôtel de Valentinois"
        titreEn: "Hôtel de Valentinois"
        adresse: "angle rue Raynouard / rue Singer, 16e"
        adresseEn: "corner of rue Raynouard / rue Singer, 16th"
        lat: 48.85640
        lon: 2.27830
        tags: [résidence]
        personnages: [Benjamin Franklin]
        description: "Résidence de Benjamin Franklin de 1777 à 1785, mis à disposition par Jacques-Donatien Le Ray de Chaumont. Franklin y installa la Légation américaine officielle et une imprimerie. Il y reçut Turgot, Buffon, d'Alembert, Condorcet, Beaumarchais et le jeune La Fayette. C'est depuis Passy qu'il négocia les Traités d'Amitié, de Commerce et d'Alliance signés le 6 février 1778. Le 21 novembre 1783, il assista au premier vol habité de l'histoire depuis le Château de la Muette voisin."
        descriptionEn: "Residence of Benjamin Franklin from 1777 to 1785, provided by Jacques-Donatien Le Ray de Chaumont. Franklin established the official American Legation and a printing press there. He received Turgot, Buffon, d'Alembert, Condorcet, Beaumarchais, and the young La Fayette. From Passy, he negotiated the Treaties of Amity, Commerce and Alliance signed on February 6, 1778. On November 21, 1783, he witnessed the first manned flight in history from the nearby Château de la Muette."
        wikipedia: "https://fr.wikipedia.org/wiki/Benjamin_Franklin"
        wikipediaEn: "https://en.wikipedia.org/wiki/Benjamin_Franklin"

      - titre: "Hôtel Antier"
        titreEn: "Hôtel Antier"
        adresse: "43-47 rue d'Auteuil, 16e"
        adresseEn: "43-47 rue d'Auteuil, 16th"
        lat: 48.84780
        lon: 2.25870
        tags: [résidence]
        personnages: [John Adams, John Quincy Adams]
        description: "Résidence de John Adams (futur 2e président) et de son fils John Quincy Adams (futur 6e président) d'août 1784 à mai 1785. Adams avait négocié aux côtés de Franklin et Jay le Traité de Paris de 1783 qui mit fin à la Guerre d'Indépendance."
        descriptionEn: "Residence of John Adams (future 2nd President) and his son John Quincy Adams (future 6th President) from August 1784 to May 1785. Adams had negotiated alongside Franklin and Jay the Treaty of Paris of 1783 that ended the War of Independence."
        wikipedia: "https://fr.wikipedia.org/wiki/John_Adams"
        wikipediaEn: "https://en.wikipedia.org/wiki/John_Adams"

