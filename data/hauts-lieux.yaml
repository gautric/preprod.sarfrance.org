        descriptionEn: "Pierre Babaud de La Chaussade's metallurgical enterprise, specialized in anchor parts for the Navy. The forges helped arm the French ships engaged in the Battle of the Chesapeake (1781)."
        wikipedia: "https://fr.wikipedia.org/wiki/Forges_de_la_Chauss%C3%A9e"

