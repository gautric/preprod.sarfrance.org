      - titre: "Brest"
        titreEn: "Brest"
        adresse: "Brest, Finistère"
        adresseEn: "Brest, Finistère"
        lat: 48.39000
        lon: -4.49000
        tags: [port, arsenal]
        personnages: [La Fayette, Rochambeau, Amiral de Grasse]
        url: "https://www.musee-marine.fr/nos-musees/brest.html"
        urlEn: "https://www.musee-marine.fr/en/our-museums/brest.html"
        description: "Premier arsenal de France, base de départ des expéditions vers l'Amérique. La Fayette y accosta en février 1779 ; Rochambeau en partit le 2 mai 1780 avec 5 500 hommes ; l'amiral de Grasse appareilla le 22 mars 1781. Un monument à Rochambeau et de Grasse s'élève Cours Dajot."
        descriptionEn: "France's foremost naval arsenal and departure point for expeditions to America. La Fayette landed here in February 1779; Rochambeau departed on May 2, 1780 with 5,500 men; Admiral de Grasse set sail on March 22, 1781. A monument to Rochambeau and de Grasse stands on Cours Dajot."

