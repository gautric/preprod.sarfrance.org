    title: "Centenaire de SAR France au Puy du Fou"
    type: commémoration
    description: "Week-end de célébration du centenaire de SAR France au Puy du Fou. Forfait de 2 jours avec 2 nuits à la Villa Gallo-romaine. Samedi : accueil dès 8 h 30, ouverture du parc à 9 h 30 (pass émotion inclus), chambres disponibles à 16 h, cérémonie officielle à 17 h 30 au théâtre Molière (cocktail, discours, dîner buffet), Cinéscénie à la tombée de la nuit. Dimanche : visite libre du parc, dîner spectacle à La Madelon suivi des Noces de feu. Départ lundi avant 11 h. Transport non inclus (parking sur place ou navettes depuis la gare d'Angers)."
    location: "Puy du Fou, Les Epesses"
