{{- $repo := "https://github.com/gautric/preprod.sarfrance.org" -}}
{{- $filePath := .File.Path -}}
<div class="page-contribute">
    <button class="page-contribute-toggle" aria-label="{{ i18n "contribute_label" }}" aria-expanded="false">
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <ul class="page-contribute-dropdown">
        <li>
            <a href="{{ $repo }}/issues/new?template=bug-site.yml&title={{ i18n "contribute_error_prefix" | urlquery }}{{ .Title | urlquery }}" target="_blank" rel="noopener">
                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ i18n "contribute_error" }}
            </a>
        </li>
        <li>
            <a href="{{ $repo }}/issues/new?template=modification-contenu.yml&title={{ i18n "contribute_comment_prefix" | urlquery }}{{ .Title | urlquery }}" target="_blank" rel="noopener">
                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                {{ i18n "contribute_comment" }}
            </a>
        </li>
    </ul>
</div>
