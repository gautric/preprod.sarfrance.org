{{ define "main" }}
<section class="list-page">
    <div class="page-header">
        <div class="container">
            <h1>{{ .Title }}</h1>
            {{ if .Description }}<p class="page-description">{{ .Description }}</p>{{ end }}
        </div>
    </div>
    <div class="container">
        {{ .Content }}
    </div>
</section>
{{ end }}
