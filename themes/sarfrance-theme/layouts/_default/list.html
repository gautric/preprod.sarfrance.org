{{ define "main" }}
<section class="list-page">
    <div class="page-header">
        <div class="container">
            <h1>{{ .Title }}</h1>
            {{ if .Description }}<p class="page-description">{{ .Description }}</p>{{ end }}
        </div>
    </div>
    <div class="container">
        {{ .Content }}
        {{ if .Pages }}
        <div class="page-list">
            {{ range .Pages }}
            <article class="list-item">
                <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
                {{ if .Summary }}<p>{{ .Summary }}</p>{{ end }}
                <a href="{{ .Permalink }}" class="read-more">Lire la suite →</a>
            </article>
            {{ end }}
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
