{{ define "main" }}
<article class="page-content">
    <div class="page-header">
        <div class="container">
            <h1>{{ .Title }}</h1>
            {{ if .Description }}<p class="page-description">{{ .Description }}</p>{{ end }}
            {{ if .File }}{{- partial "page-contribute.html" . -}}{{ end }}
        </div>
    </div>
    <div class="container">
        <div class="content">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
