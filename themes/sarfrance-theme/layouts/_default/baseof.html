<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ .Site.Params.description }}">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/images/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/images/icons/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/images/icons/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/images/icons/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/images/icons/apple-touch-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/images/icons/apple-touch-icon-60x60.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="msapplication-TileImage" content="/images/icons/mstile-150x150.png">
    <meta name="msapplication-TileColor" content="#1a2a4a">
    <meta name="theme-color" content="#1a2a4a">
    <meta property="og:image" content="/images/icons/og-image.png">
    <link rel="stylesheet" href="/css/style.css">
    {{ if .IsHome }}<link rel="stylesheet" href="/css/carousel.css">{{ end }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Libre+Bodoni:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    {{- block "head" . }}{{- end }}
</head>
<body>
    {{- partial "header.html" . -}}
    <main class="gold-accent">
        {{- block "main" . }}{{- end }}
    </main>
    {{- partial "footer.html" . -}}
    <script src="/js/main.js"></script>
    {{ if .IsHome }}<script src="/js/carousel.js"></script>{{ end }}
</body>
</html>
